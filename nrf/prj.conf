# Joypad bt2usb — nRF52840 Kconfig
#
# BTstack is the BLE host (via raw HCI), TinyUSB is the USB device stack.
# Zephyr provides: kernel, BLE controller (link layer), GPIO, NVS, clock.

# ============================================================================
# BLE Controller (raw HCI passthrough — BTstack is the host)
# ============================================================================
CONFIG_BT=y
CONFIG_BT_HCI_RAW=y
CONFIG_BT_CTLR_ASSERT_HANDLER=y
CONFIG_BT_BUF_ACL_RX_SIZE=255
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_CMD_TX_SIZE=255
CONFIG_BT_BUF_EVT_DISCARDABLE_SIZE=255
CONFIG_BT_CTLR_PRIVACY=n

# SoftDevice Controller needs these to compile in scanning + connection support.
# Without them, HCI LE scan/connect commands are rejected by the controller.
CONFIG_BT_OBSERVER=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_MAX_CONN=2

# BTstack sends HCI commands with K_NO_WAIT; default count (2) causes drops.
CONFIG_BT_BUF_CMD_TX_COUNT=10

# ============================================================================
# USB — disabled (TinyUSB drives nRF52840 USBD hardware directly)
# ============================================================================
CONFIG_USB_DEVICE_STACK=n

# ============================================================================
# GPIO, Flash, NVS, Entropy
# ============================================================================
CONFIG_GPIO=y
CONFIG_ENTROPY_GENERATOR=y
CONFIG_HWINFO=y
CONFIG_REBOOT=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y

# ============================================================================
# C library
# ============================================================================
CONFIG_NEWLIB_LIBC=y

# ============================================================================
# Console — UART (RTT requires debug probe; TinyUSB owns USB, not Zephyr)
# ============================================================================
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

# ============================================================================
# Stack / memory
# ============================================================================
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_BT_RX_STACK_SIZE=1024
CONFIG_BT_HCI_TX_STACK_SIZE_WITH_PROMPT=y
CONFIG_BT_HCI_TX_STACK_SIZE=640
CONFIG_ISR_STACK_SIZE=2048
CONFIG_IDLE_STACK_SIZE=256

# ============================================================================
# Build output
# ============================================================================
CONFIG_BUILD_OUTPUT_UF2=y
CONFIG_SIZE_OPTIMIZATIONS=y

# ============================================================================
# Disable unused subsystems
# ============================================================================
CONFIG_I2C=y
CONFIG_SPI=n
CONFIG_WATCHDOG=n
CONFIG_PM=n
CONFIG_BOOT_BANNER=n
CONFIG_BOOT_DELAY=0
CONFIG_ARM_MPU=y
CONFIG_MPU_STACK_GUARD=y
CONFIG_DYNAMIC_INTERRUPTS=y
CONFIG_IRQ_OFFLOAD=n

# ============================================================================
# Fault reporting — get register dump + stack trace on hard fault
# ============================================================================
CONFIG_FAULT_DUMP=2
