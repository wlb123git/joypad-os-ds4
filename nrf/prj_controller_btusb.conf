# Joypad controller_btusb — nRF52840 Kconfig overrides
#
# Applied on top of prj.conf when building APP_TYPE=controller_btusb.
# BLE peripheral mode (HOGP gamepad) + sensor input.
# BTstack handles BLE host stack via raw HCI — Zephyr provides the controller.

# Enable peripheral role in the SoftDevice Controller
# (prj.conf already has CONFIG_BT_CENTRAL=y and CONFIG_BT_OBSERVER=y for central;
#  peripheral mode additionally needs CONFIG_BT_PERIPHERAL for advertising support)
CONFIG_BT_PERIPHERAL=y
