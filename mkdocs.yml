site_name: Joypad OS
site_url: https://docs.joypad.ai
site_description: Universal controller firmware for adapters, controllers, and input systems
repo_url: https://github.com/joypad-ai/joypad-os
repo_name: joypad-ai/joypad-os

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  logo: images/logo_solid.svg
  favicon: images/logo_solid.svg

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Building from Source: getting-started/building.md
  - Adapters:
    - PC Engine / TurboGrafx-16: adapters/pcengine.md
    - GameCube / Wii: adapters/gamecube.md
    - Dreamcast: adapters/dreamcast.md
    - Nuon: adapters/nuon.md
    - 3DO: adapters/3do.md
    - Neo Geo / SuperGun: adapters/neogeo.md
    - Casio Loopy: adapters/loopy.md
    - USB Output: adapters/usb.md
    - Bluetooth: adapters/bluetooth.md
    - Native Input: adapters/native-input.md
  - Hardware:
    - Supported Controllers: hardware/controllers.md
    - Supported Boards: hardware/boards.md
    - Wiring Guide: hardware/wiring.md
    - DIY Builds: hardware/diy.md
  - Platforms:
    - ESP32-S3: platforms/esp32.md
    - nRF52840: platforms/nrf52840.md
  - Architecture:
    - How It Works: architecture/overview.md
    - Layers & Internals: architecture/layers.md
  - Protocol Reference:
    - 3DO PBus: protocols/3DO_PBUS.md
    - GameCube Joybus: protocols/GAMECUBE_JOYBUS.md
    - Nuon Polyface: protocols/NUON_POLYFACE.md
    - PC Engine: protocols/PCENGINE.md
  - Features:
    - SNES Rumble: features/SNES_RUMBLE.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/joypad-ai/joypad-os
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/joypad_ai
